<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Signup - CreatorMatch AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="cursorFollower"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="form-page">
    <div class="form-bg">
        <div class="form-blob form-blob-1"></div>
        <div class="form-blob form-blob-2"></div>
    </div>

    <div class="form-container">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>

        <div class="form-card">
            <div class="form-header">
                <a href="index.html" class="form-logo">
                    <div class="logo-icon">⚡</div>
                    <span class="gradient-text">CreatorMatch</span>
                </a>
                <h2>Join as <span class="gradient-text">Creator</span></h2>
                <p>Connect your channel and let AI find your perfect brand matches</p>
            </div>

            <!-- STEP INDICATOR -->
            <div class="step-indicator">
                <div class="step-item active" id="step-ind-1">
                    <div class="step-circle">1</div>
                    <span class="step-item-label">Personal</span>
                </div>
                <div class="step-connector" id="conn-1"></div>
                <div class="step-item" id="step-ind-2">
                    <div class="step-circle">2</div>
                    <span class="step-item-label">Channel</span>
                </div>
                <div class="step-connector" id="conn-2"></div>
                <div class="step-item" id="step-ind-3">
                    <div class="step-circle">3</div>
                    <span class="step-item-label">Plan</span>
                </div>
            </div>

            <form id="creatorSignupForm" novalidate>

                <!-- STEP 1 - PERSONAL INFO -->
                <div class="form-step-panel active" id="panel-1">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name <span class="req">*</span></label>
                            <div class="input-wrap">
                                <i class="fas fa-user i-icon"></i>
                                <input type="text" class="form-control" id="fullName"
                                    placeholder="Your full name" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Country <span class="req">*</span></label>
                            <div class="input-wrap">
                                <i class="fas fa-globe i-icon"></i>
                                <select class="form-control" id="country" required>
                                    <option value="">Select country</option>
                                    <option>India</option>
                                    <option>United States</option>
                                    <option>United Kingdom</option>
                                    <option>Canada</option>
                                    <option>Australia</option>
                                    <option>Germany</option>
                                    <option>France</option>
                                    <option>Brazil</option>
                                    <option>Japan</option>
                                    <option>South Korea</option>
                                    <option>Singapore</option>
                                    <option>UAE</option>
                                    <option>Other</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email Address <span class="req">*</span></label>
                        <div class="input-wrap">
                            <i class="fas fa-envelope i-icon"></i>
                            <input type="email" class="form-control" id="email"
                                placeholder="your@email.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password <span class="req">*</span></label>
                        <div class="input-wrap">
                            <i class="fas fa-lock i-icon"></i>
                            <input type="password" class="form-control" id="password"
                                placeholder="Create a strong password"
                                required oninput="checkPasswordStrength(this.value)">
                            <button type="button" class="pass-toggle"
                                onclick="togglePassword('password',this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <!-- PASSWORD STRENGTH -->
                        <div class="pass-strength" id="passStrength" style="display:none">
                            <div class="pass-strength-bars">
                                <div class="pass-bar" id="bar1"></div>
                                <div class="pass-bar" id="bar2"></div>
                                <div class="pass-bar" id="bar3"></div>
                                <div class="pass-bar" id="bar4"></div>
                            </div>
                            <span class="pass-strength-text" id="passStrengthText"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password <span class="req">*</span></label>
                        <div class="input-wrap">
                            <i class="fas fa-lock i-icon"></i>
                            <input type="password" class="form-control" id="confirmPassword"
                                placeholder="Confirm your password" required>
                            <button type="button" class="pass-toggle"
                                onclick="togglePassword('confirmPassword',this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-nav">
                        <div></div>
                        <button type="button" class="btn btn-primary"
                            onclick="nextStep(1)">
                            Next <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <!-- STEP 2 - CHANNEL INFO -->
                <div class="form-step-panel" id="panel-2">
                    <div class="form-group">
                        <label>YouTube Channel Link <span class="req">*</span></label>
                        <div class="input-wrap">
                            <i class="fab fa-youtube i-icon" style="color:#ff0000"></i>
                            <input type="url" class="form-control" id="youtubeLink"
                                placeholder="https://youtube.com/@yourchannel" required>
                        </div>
                        <div class="form-hint">
                            <i class="fas fa-info-circle"></i>
                            Our AI will analyze your channel data automatically
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Content Niche <span class="req">*</span></label>
                            <div class="input-wrap">
                                <i class="fas fa-tag i-icon"></i>
                                <select class="form-control" id="niche" required>
                                    <option value="">Select niche</option>
                                    <option>Technology</option>
                                    <option>Gaming</option>
                                    <option>Beauty & Fashion</option>
                                    <option>Fitness & Health</option>
                                    <option>Food & Cooking</option>
                                    <option>Travel</option>
                                    <option>Finance</option>
                                    <option>Education</option>
                                    <option>Entertainment</option>
                                    <option>Lifestyle</option>
                                    <option>Music</option>
                                    <option>Sports</option>
                                    <option>Business</option>
                                    <option>Art & Design</option>
                                    <option>Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Primary Content Type <span class="req">*</span></label>
                            <div class="input-wrap">
                                <i class="fas fa-film i-icon"></i>
                                <select class="form-control" id="contentType" required>
                                    <option value="">Select type</option>
                                    <option>Reviews</option>
                                    <option>Tutorials</option>
                                    <option>Vlogs</option>
                                    <option>Shorts</option>
                                    <option>Live Streams</option>
                                    <option>Podcasts</option>
                                    <option>Documentaries</option>
                                    <option>Comedy</option>
                                    <option>Interviews</option>
                                    <option>Other</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Approximate Subscriber Count</label>
                            <div class="input-wrap">
                                <i class="fas fa-users i-icon"></i>
                                <select class="form-control" id="subCount">
                                    <option value="">Select range</option>
                                    <option>Under 1K</option>
                                    <option>1K - 10K</option>
                                    <option>10K - 50K</option>
                                    <option>50K - 100K</option>
                                    <option>100K - 500K</option>
                                    <option>500K - 1M</option>
                                    <option>Above 1M</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Upload Frequency</label>
                            <div class="input-wrap">
                                <i class="fas fa-calendar i-icon"></i>
                                <select class="form-control" id="uploadFreq">
                                    <option value="">Select frequency</option>
                                    <option>Daily</option>
                                    <option>2-3 times/week</option>
                                    <option>Weekly</option>
                                    <option>Bi-weekly</option>
                                    <option>Monthly</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Bio / About You</label>
                        <textarea class="form-control" id="bio"
                            placeholder="Tell brands about yourself and your content..."
                            rows="3"></textarea>
                    </div>

                    <div class="form-nav">
                        <button type="button" class="btn btn-outline"
                            onclick="prevStep(2)">
                            <i class="fas fa-arrow-left"></i> Back
                        </button>
                        <button type="button" class="btn btn-primary"
                            onclick="nextStep(2)">
                            Next <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <!-- STEP 3 - PLAN SELECTION -->
                <div class="form-step-panel" id="panel-3">
                    <div class="form-group">
                        <label>Choose Your Plan <span class="req">*</span></label>
                        <div class="plan-selector">
                            <div class="plan-option selected" onclick="selectPlan(this,'free')">
                                <input type="radio" name="plan" value="free" checked>
                                <div class="plan-check"><i class="fas fa-check"></i></div>
                                <div class="plan-option-name">Free</div>
                                <div class="plan-option-price">$0</div>
                                <div class="plan-option-sub">per month</div>
                            </div>
                            <div class="plan-option" onclick="selectPlan(this,'pro')">
                                <input type="radio" name="plan" value="pro">
                                <div class="plan-check"><i class="fas fa-check"></i></div>
                                <div class="plan-option-name">Pro</div>
                                <div class="plan-option-price">$29</div>
                                <div class="plan-option-sub">per month</div>
                            </div>
                            <div class="plan-option" onclick="selectPlan(this,'enterprise')">
                                <input type="radio" name="plan" value="enterprise">
                                <div class="plan-check"><i class="fas fa-check"></i></div>
                                <div class="plan-option-name">Enterprise</div>
                                <div class="plan-option-price">$99</div>
                                <div class="plan-option-sub">per month</div>
                            </div>
                        </div>
                    </div>

                    <!-- TERMS -->
                    <div class="form-group">
                        <label class="check-group">
                            <input type="checkbox" id="terms">
                            <div class="check-box"></div>
                            <span class="check-label">
                                I agree to the
                                <a href="#">Terms of Service</a> and
                                <a href="#">Privacy Policy</a>
                            </span>
                        </label>
                    </div>

                    <div class="form-group">
                        <label class="check-group">
                            <input type="checkbox" id="newsletter">
                            <div class="check-box"></div>
                            <span class="check-label">
                                Send me updates about new features and campaigns
                            </span>
                        </label>
                    </div>

                    <div class="form-nav">
                        <button type="button" class="btn btn-outline"
                            onclick="prevStep(3)">
                            <i class="fas fa-arrow-left"></i> Back
                        </button>
                        <button type="submit" class="btn btn-primary"
                            id="submitBtn">
                            <i class="fas fa-rocket"></i> Create Account
                        </button>
                    </div>
                </div>

            </form>

            <div class="form-footer">
                Already have an account?
                <a href="login.html">Sign in here</a>
            </div>
        </div>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
