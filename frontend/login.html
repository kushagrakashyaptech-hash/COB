<!-- ===== login.html ===== -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CreatorMatch AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="cursorFollower"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="form-page">
    <div class="form-bg">
        <div class="form-blob form-blob-1"></div>
        <div class="form-blob form-blob-2"></div>
    </div>

    <div class="form-container">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>

        <div class="form-card">
            <div class="form-header">
                <a href="index.html" class="form-logo">
                    <div class="logo-icon">⚡</div>
                    <span class="gradient-text">CreatorMatch</span>
                </a>
                <h2>Welcome <span class="gradient-text">Back</span></h2>
                <p>Sign in to your account to continue</p>
            </div>

            <!-- LOGIN TYPE TABS -->
            <div class="tabs" style="margin:0 auto 32px;display:flex">
                <button class="tab-btn active" id="creatorTab"
                    onclick="switchLoginType('creator')">
                    <i class="fas fa-user-circle"></i> Creator
                </button>
                <button class="tab-btn" id="brandTab"
                    onclick="switchLoginType('brand')">
                    <i class="fas fa-building"></i> Brand
                </button>
            </div>

            <form id="loginForm" novalidate>

                <div class="form-group">
                    <label>Email Address <span class="req">*</span></label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope i-icon"></i>
                        <input type="email" class="form-control"
                            id="loginEmail"
                            placeholder="your@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        Password <span class="req">*</span>
                        <a href="#" style="float:right;font-size:0.8rem;
                            color:var(--primary-light);font-weight:600">
                            Forgot password?
                        </a>
                    </label>
                    <div class="input-wrap">
                        <i class="fas fa-lock i-icon"></i>
                        <input type="password" class="form-control"
                            id="loginPassword"
                            placeholder="Your password" required>
                        <button type="button" class="pass-toggle"
                            onclick="togglePassword('loginPassword',this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="check-group">
                        <input type="checkbox" id="rememberMe">
                        <div class="check-box"></div>
                        <span class="check-label">Remember me for 30 days</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg"
                    id="loginBtn" style="margin-top:8px">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign In as <span id="loginTypeText">Creator</span>
                </button>

                <div class="form-divider">
                    <div class="form-divider-line"></div>
                    <span class="form-divider-text">or continue with</span>
                    <div class="form-divider-line"></div>
                </div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                    <button type="button" class="btn btn-ghost">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="btn btn-ghost">
                        <i class="fab fa-youtube" style="color:#ff0000"></i> YouTube
                    </button>
                </div>

            </form>

            <div class="form-footer" style="margin-top:24px">
                Don't have an account?
                <a href="creator-signup.html" id="signupLink">Sign up as Creator</a>
            </div>
        </div>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
