<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Signup - CreatorMatch AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="cursorFollower"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="form-page">
    <div class="form-bg">
        <div class="form-blob form-blob-1"></div>
        <div class="form-blob form-blob-2"></div>
    </div>

    <div class="form-container">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>

        <div class="form-card">
            <div class="form-header">
                <a href="index.html" class="form-logo">
                    <div class="logo-icon">⚡</div>
                    <span class="gradient-text">CreatorMatch</span>
                </a>
                <h2>Join as <span class="gradient-text-3">Brand</span></h2>
                <p>Create campaigns and let AI find your perfect creators</p>
            </div>

            <!-- STEP INDICATOR -->
            <div class="step-indicator">
                <div class="step-item active" id="step-ind-1">
                    <div class="step-circle">1</div>
                    <span class="step-item-label">Account</span>
                </div>
                <div class="step-connector" id="conn-1"></div>
                <div class="step-item" id="step-ind-2">
                    <div class="step-circle">2</div>
                    <span class="step-item-label">Company</span>
                </div>
                <div class="step-connector" id="conn-2"></div>
                <div class="step-item" id="step-ind-3">
                    <div class="step-circle">3</div>
                    <span class="step-item-label">Plan</span>
                </div>
            </div>

            <form id="brandSignupForm" novalidate>

                <!-- STEP 1 - ACCOUNT INFO -->
                <div class="form-step-panel active" id="panel-1">

                    <div class="form-row">
                        <div class="form-group">
                            <label>Brand Name <span class="req">*</span></label>
                            <div class="input-wrap">
                                <i class="fas fa-star i-icon"></i>
                                <input type="text" class="form-control"
                                    id="brandName"
                                    placeholder="Your brand name" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Company Name <span class="req">*</span></label>
                            <div class="input-wrap">
                                <i class="fas fa-building i-icon"></i>
                                <input type="text" class="form-control"
                                    id="companyName"
                                    placeholder="Legal company name" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email Address <span class="req">*</span></label>
                        <div class="input-wrap">
                            <i class="fas fa-envelope i-icon"></i>
                            <input type="email" class="form-control"
                                id="email"
                                placeholder="company@email.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password <span class="req">*</span></label>
                        <div class="input-wrap">
                            <i class="fas fa-lock i-icon"></i>
                            <input type="password" class="form-control"
                                id="password"
                                placeholder="Create a strong password"
                                required
                                oninput="checkPasswordStrength(this.value)">
                            <button type="button" class="pass-toggle"
                                onclick="togglePassword('password',this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="pass-strength" id="passStrength" style="display:none">
                            <div class="pass-strength-bars">
                                <div class="pass-bar" id="bar1"></div>
                                <div class="pass-bar" id="bar2"></div>
                                <div class="pass-bar" id="bar3"></div>
                                <div class="pass-bar" id="bar4"></div>
                            </div>
                            <span class="pass-strength-text" id="passStrengthText"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password <span class="req">*</span></label>
                        <div class="input-wrap">
                            <i class="fas fa-lock i-icon"></i>
                            <input type="password" class="form-control"
                                id="confirmPassword"
                                placeholder="Confirm your password" required>
                            <button type="button" class="pass-toggle"
                                onclick="togglePassword('confirmPassword',this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-nav">
                        <div></div>
                        <button type="button" class="btn btn-primary"
                            onclick="nextStep(1)">
                            Next <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <!-- STEP 2 - COMPANY DETAILS -->
                <div class="form-step-panel" id="panel-2">

                    <div class="form-group">
                        <label>Company Website</label>
                        <div class="input-wrap">
                            <i class="fas fa-globe i-icon"></i>
                            <input type="url" class="form-control"
                                id="website"
                                placeholder="https://yourcompany.com">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Industry Category <span class="req">*</span></label>
                            <div class="input-wrap">
                                <i class="fas fa-industry i-icon"></i>
                                <select class="form-control" id="industry" required>
                                    <option value="">Select industry</option>
                                    <option>Technology</option>
                                    <option>Fashion & Apparel</option>
                                    <option>Beauty & Cosmetics</option>
                                    <option>Food & Beverage</option>
                                    <option>Health & Wellness</option>
                                    <option>Gaming</option>
                                    <option>Finance & Fintech</option>
                                    <option>Education & EdTech</option>
                                    <option>Travel & Hospitality</option>
                                    <option>Sports & Fitness</option>
                                    <option>Entertainment & Media</option>
                                    <option>E-commerce & Retail</option>
                                    <option>Automotive</option>
                                    <option>Real Estate</option>
                                    <option>Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Year Founded <span class="req">*</span></label>
                            <div class="input-wrap">
                                <i class="fas fa-calendar i-icon"></i>
                                <input type="number" class="form-control"
                                    id="foundedYear"
                                    placeholder="e.g. 2018"
                                    min="1900"
                                    max="2024" required>
                            </div>
                            <div class="form-hint">
                                <i class="fas fa-info-circle"></i>
                                Used by AI to calculate investment cap
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Target Audience <span class="req">*</span></label>
                            <div class="input-wrap">
                                <i class="fas fa-users i-icon"></i>
                                <select class="form-control" id="targetAudience" required>
                                    <option value="">Select audience</option>
                                    <option>Gen Z (13-24)</option>
                                    <option>Millennials (25-40)</option>
                                    <option>Gen X (41-56)</option>
                                    <option>Boomers (57+)</option>
                                    <option>All Ages</option>
                                    <option>Kids (under 13)</option>
                                    <option>Professionals</option>
                                    <option>Parents</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Target Location</label>
                            <div class="input-wrap">
                                <i class="fas fa-map-marker-alt i-icon"></i>
                                <select class="form-control" id="targetLocation">
                                    <option value="">Select location</option>
                                    <option>India</option>
                                    <option>United States</option>
                                    <option>United Kingdom</option>
                                    <option>Global</option>
                                    <option>South Asia</option>
                                    <option>Southeast Asia</option>
                                    <option>Europe</option>
                                    <option>Middle East</option>
                                    <option>Other</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Company Description</label>
                        <textarea class="form-control" id="companyDesc"
                            placeholder="Tell creators about your brand and what you do..."
                            rows="3"></textarea>
                    </div>

                    <div class="form-nav">
                        <button type="button" class="btn btn-outline"
                            onclick="prevStep(2)">
                            <i class="fas fa-arrow-left"></i> Back
                        </button>
                        <button type="button" class="btn btn-primary"
                            onclick="nextStep(2)">
                            Next <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <!-- STEP 3 - PLAN -->
                <div class="form-step-panel" id="panel-3">

                    <div class="form-group">
                        <label>Choose Your Plan <span class="req">*</span></label>
                        <div class="plan-selector">
                            <div class="plan-option selected"
                                onclick="selectPlan(this,'starter')">
                                <input type="radio" name="plan"
                                    value="starter" checked>
                                <div class="plan-check">
                                    <i class="fas fa-check"></i>
                                </div>
                                <div class="plan-option-name">Starter</div>
                                <div class="plan-option-price">$49</div>
                                <div class="plan-option-sub">per month</div>
                            </div>
                            <div class="plan-option"
                                onclick="selectPlan(this,'growth')">
                                <input type="radio" name="plan" value="growth">
                                <div class="plan-check">
                                    <i class="fas fa-check"></i>
                                </div>
                                <div class="plan-option-name">Growth</div>
                                <div class="plan-option-price">$149</div>
                                <div class="plan-option-sub">per month</div>
                            </div>
                            <div class="plan-option"
                                onclick="selectPlan(this,'enterprise')">
                                <input type="radio" name="plan"
                                    value="enterprise">
                                <div class="plan-check">
                                    <i class="fas fa-check"></i>
                                </div>
                                <div class="plan-option-name">Enterprise</div>
                                <div class="plan-option-price">$499</div>
                                <div class="plan-option-sub">per month</div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="check-group">
                            <input type="checkbox" id="terms">
                            <div class="check-box"></div>
                            <span class="check-label">
                                I agree to the
                                <a href="#">Terms of Service</a> and
                                <a href="#">Privacy Policy</a>
                            </span>
                        </label>
                    </div>

                    <div class="form-group">
                        <label class="check-group">
                            <input type="checkbox" id="newsletter">
                            <div class="check-box"></div>
                            <span class="check-label">
                                Send me updates about new creators and features
                            </span>
                        </label>
                    </div>

                    <div class="form-nav">
                        <button type="button" class="btn btn-outline"
                            onclick="prevStep(3)">
                            <i class="fas fa-arrow-left"></i> Back
                        </button>
                        <button type="submit" class="btn btn-primary"
                            id="submitBtn">
                            <i class="fas fa-rocket"></i> Create Account
                        </button>
                    </div>
                </div>

            </form>

            <div class="form-footer">
                Already have an account?
                <a href="login.html">Sign in here</a>
            </div>
        </div>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
